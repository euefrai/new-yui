<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Yui</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="loginScreen" class="loginScreen">
    <div class="loginCard">
      <h1 class="loginLogo">
        <img src="/static/yui-icon.png" alt="Yui" class="yuiLogoImg" />
      </h1>
      <p class="loginSub">Entre para acessar seus chats</p>
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="E-mail" required />
        <input type="password" id="loginPassword" placeholder="Senha" required />
        <button type="submit">Entrar</button>
      </form>
      <p class="loginHint">Não tem conta? <a href="#" id="toggleSignUp">Cadastrar</a></p>
      <p id="loginError" class="loginError"></p>
    </div>
  </div>

  <div id="appScreen" class="app" style="display: none;">
    <div class="appContent" id="appContent" data-model="yui">
    <aside class="sidebar">
      <div class="logo" id="sidebarLogo">
        <img src="/static/yui-icon.png" alt="Yui" class="yuiLogoImg" id="sidebarAvatar" />
      </div>
      <button type="button" id="novoChat" class="btnNovoChat">+ Novo chat</button>
      <button type="button" id="toggleWorkspace" class="btnToggleWorkspace" title="Abrir/fechar Editor (Ctrl+L)">
        <span class="btnToggleIcon">&#60;/&#62;</span>
        <span class="btnToggleLabel">Editor</span>
      </button>
      <button type="button" id="clearChat" class="btnClearChat" title="Limpar memória da sessão">Excluir Chat</button>
      <div id="listaChats" class="listaChats"></div>
      <div class="telemetryPanel" id="telemetryPanel" title="Custo acumulado do dia">
        <div class="telemetryTitle">Telemetria</div>
        <div class="telemetryRow">
          <span class="telemetryLabel">Custo hoje</span>
          <span class="telemetryValue" id="telemetryCost">—</span>
        </div>
        <div class="telemetryRow">
          <span class="telemetryLabel">Requisições</span>
          <span class="telemetryValue" id="telemetryRequests">—</span>
        </div>
      </div>
      <div class="userFooter">
        <div class="userAvatar" id="userAvatar" title="Avatar"></div>
        <span id="userName">Usuário</span>
        <button type="button" id="btnSair" class="btnSair" title="Sair">Sair</button>
      </div>
    </aside>
    <div class="mainSplit" id="mainSplit">
      <main class="chatArea">
        <div class="chatContainer">
          <div id="chat" class="chatMessages"></div>
          <div class="modelSwitcherWrap">
            <label class="modelSwitcherLabel">Modelo</label>
            <select id="modelSwitcher" class="modelSwitcher" title="Alternar entre Yui e Heathcliff">
              <option value="yui">Yui — Modo Padrão</option>
              <option value="heathcliff">Heathcliff — Modo Engenheiro</option>
            </select>
          </div>
          <div class="inputArea" id="inputArea">
          <label class="btnAnexo" title="Enviar arquivo para análise">
            <span class="btnAnexoIcon">&#128206;</span>
            <input type="file" id="fileInput" hidden accept=".py,.js,.ts,.json,.txt,.md,.html,.css,.yml,.yaml,.java,.tsx,.jsx" />
          </label>
          <input id="msg" type="text" placeholder="Digite sua mensagem..." autocomplete="off" />
          <button type="button" id="btnEnviar">Enviar</button>
          </div>
          <div class="systemHealthBar" id="systemHealthBar" aria-hidden="true">
            <div class="systemHealthIndicator" id="systemHealthIndicator"></div>
            <span class="systemHealthLabel" id="systemHealthLabel">Sistema: —</span>
          </div>
        </div>
      </main>
      <aside class="workspacePanel" id="workspacePanel">
        <div class="workspaceHeader">
          <span class="workspaceTitle">Workspace</span>
          <div class="workspaceActions">
            <input type="file" id="workspaceImportInput" webkitdirectory directory multiple hidden />
            <button type="button" id="workspaceRun" class="workspaceBtn workspaceBtnPlay" title="Executar código (Ctrl+Enter)">▶ Executar</button>
            <button type="button" id="workspaceSyncSandbox" class="workspaceBtn" title="Salvar no Sandbox">Salvar no Sandbox</button>
            <button type="button" id="workspaceImport" class="workspaceBtn" title="Importar projeto">Importar</button>
            <button type="button" id="workspaceExport" class="workspaceBtn" title="Exportar ZIP">Exportar ZIP</button>
            <button type="button" id="workspaceFeedYui" class="workspaceBtn workspaceBtnHighlight" title="Enviar arquivo para o chat">Alimentar Yui</button>
            <button type="button" id="workspaceCopy" class="workspaceBtn" title="Copiar">Copiar</button>
            <button type="button" id="workspaceDownload" class="workspaceBtn" title="Baixar arquivo">Baixar</button>
          </div>
        </div>
        <div class="workspaceBody">
          <div class="fileTreeSidebar" id="fileTreeSidebar">
            <div class="fileTreeEmpty" id="fileTreeEmpty">Importe um projeto para ver os arquivos</div>
            <div class="fileTreeList" id="fileTreeList" style="display: none;"></div>
          </div>
          <div class="workspaceEditorColumn">
            <div id="monacoContainer" class="monacoContainer"></div>
            <div class="workspaceConsole" id="workspaceConsole">
              <div class="workspaceConsoleHeader">Console</div>
              <pre class="workspaceConsoleOutput" id="workspaceConsoleOutput">$ Aguardando execução...</pre>
            </div>
          </div>
        </div>
      </aside>
    </div>
    </div>
  </div>

  <div id="previewPanel" class="previewPanel">
    <div class="previewHeader">
      <span id="previewTitle">Preview</span>
      <button type="button" id="closePreview" class="previewClose">×</button>
    </div>
    <iframe id="previewFrame" class="previewFrame" src="about:blank"></iframe>
  </div>

  <div id="userMenu" class="userMenu">
    <div class="userMenuHeader">
      <div class="userMenuName" id="userMenuName">Usuário</div>
      <div class="userMenuEmail" id="userMenuEmail"></div>
    </div>
    <div class="userMenuSectionTitle">Tema</div>
    <div class="userMenuRow">
      <button type="button" id="themeDarkBtn" class="userMenuItem">Modo escuro</button>
      <button type="button" id="themeLightBtn" class="userMenuItem">Modo claro</button>
    </div>
    <div class="userMenuSectionTitle">Preferências da Yui</div>
    <label class="userMenuLabel" for="prefNivel">Nível técnico</label>
    <select id="prefNivel" class="userMenuSelect">
      <option value="desconhecido">Indefinido</option>
      <option value="iniciante">Iniciante</option>
      <option value="intermediario">Intermediário</option>
      <option value="avancado">Avançado</option>
    </select>
    <label class="userMenuLabel" for="prefModo">Modo de resposta</label>
    <select id="prefModo" class="userMenuSelect">
      <option value="dev">Modo dev (direto e focado em código)</option>
      <option value="explicativo">Explicativo (mais didático)</option>
      <option value="resumido">Resumido</option>
    </select>
    <label class="userMenuLabel" for="prefLangs">Linguagens preferidas</label>
    <input id="prefLangs" class="userMenuInput" type="text" placeholder="Ex: python, js, ts" />
    <button type="button" id="saveProfileBtn" class="userMenuSave">Salvar preferências</button>
  </div>

  <script>
    window.SUPABASE_URL = "{{ supabase_url or '' }}";
    window.SUPABASE_KEY = "{{ supabase_key or '' }}";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/chat.js"></script>
  <script src="/static/editor.js"></script>
  <script src="/static/workspace-project.js"></script>
</body>
</html>
